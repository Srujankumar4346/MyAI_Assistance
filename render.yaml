services:
  - type: web
    name: myai-assistance
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        value: "sqlite:///./database/novax.db"
      - key: OLLAMA_BASE_URL
        value: "http://localhost:11434"
      - key: DEFAULT_MODEL
        value: "llama3.1:8b"
      - key: SECRET_KEY
        sync: false
      - key: ADMIN_USERNAME
        value: "SrujanKumar"
      - key: ADMIN_PASSWORD
        sync: false
      - key: GEMINI_API_KEY
        sync: false
