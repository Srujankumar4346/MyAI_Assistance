version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: novax_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://novax:novaxpass@postgres:5432/novax_db
      - ENVIRONMENT=production
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - novax_logs:/app/data/logs
      - novax_chroma:/app/data/chroma
      - novax_uploads:/app/data/uploads
      - novax_downloads:/app/data/downloads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - novax_network
    profiles:
      - core
      - full
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: novax_frontend
    ports:
      - "80:80"
    networks:
      - novax_network
    profiles:
      - core
      - full
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: novax_postgres
    environment:
      - POSTGRES_USER=novax
      - POSTGRES_PASSWORD=novaxpass
      - POSTGRES_DB=novax_db
    ports:
      - "5432:5432"
    volumes:
      - novax_db_data:/var/lib/postgresql/data
    networks:
      - novax_network
    profiles:
      - core
      - full
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novax -d novax_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: novax_ollama
    ports:
      - "11434:11434"
    volumes:
      - novax_ollama_data:/root/.ollama
    networks:
      - novax_network
    profiles:
      - ai
      - full
    restart: unless-stopped

networks:
  novax_network:
    driver: bridge

volumes:
  novax_db_data:
  novax_logs:
  novax_chroma:
  novax_uploads:
  novax_downloads:
  novax_ollama_data:
